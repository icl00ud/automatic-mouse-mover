name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Vet
      run: go vet ./...

    - name: Test
      run: go test -v ./...

    - name: Build (arm64)
      run: GOARCH=arm64 GOOS=darwin go build -o /tmp/amm cmd/main.go

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build app bundle
        run: make build

      - name: Code sign (ad-hoc)
        run: codesign --force --deep --sign - ./bin/amm.app

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          hdiutil create \
            -volname "Automatic Mouse Mover" \
            -srcfolder ./bin/amm.app \
            -ov -format UDZO \
            "./bin/Automatic-Mouse-Mover-${VERSION}-arm64.dmg"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: ./bin/*.dmg
          generate_release_notes: true
          body: |
            ## Native Apple Silicon (arm64) build

            Fork of [prashantgupta24/automatic-mouse-mover](https://github.com/prashantgupta24/automatic-mouse-mover),
            rebuilt **natively for Apple Silicon** Macs.

            - **arm64 native binary** — no Rosetta 2, no "app not optimized" warning
            - Fixes the `CGDisplayCreateImageForRect` crash on macOS 15 (API removed by Apple)
            - Updated `robotgo` to v1.0.2 · requires **macOS 13.0+**

            ### Install
            1. Download the `.dmg` below
            2. Open it and drag `amm.app` to Applications
            3. Launch — it appears in the menu bar
            4. Allow it in **System Settings → Privacy & Security → Accessibility**
